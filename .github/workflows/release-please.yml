name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python

      - name: Post passing lint check on Release PR
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_SHA=$(gh pr view "${{ fromJSON(steps.release.outputs.pr).number }}" \
            --repo "$GITHUB_REPOSITORY" --json headRefOid -q .headRefOid)
          gh api "repos/$GITHUB_REPOSITORY/statuses/$PR_SHA" \
            --method POST \
            -f state=success \
            -f context="Lint PR Title" \
            -f description="Release PR title is a valid conventional commit"

      - name: Auto-merge Release PR
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash --repo "$GITHUB_REPOSITORY" "${{ fromJSON(steps.release.outputs.pr).number }}"
